<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đếm ngược 30 năm Hội ngộ lớp 96Q</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
      font-family:Arial,Helvetica,sans-serif;color:#fff;
      background:radial-gradient(circle at top,rgba(38,78,137,.7),transparent 45%),linear-gradient(160deg,#041027,#06152f)
    }
    .wrap{
      width:min(960px,100%);text-align:center;padding:38px 22px;
      border:1px solid rgba(217,182,92,.5);border-radius:24px;
      background:rgba(8,28,62,.82);box-shadow:0 20px 60px rgba(0,0,0,.28)
    }
    .eyebrow{margin:0 0 8px;color:#f3d98a;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(13px,2vw,18px)}
    h1{margin:0;color:#d9b65c;font-size:clamp(34px,7vw,68px);line-height:1.08;text-transform:uppercase}
    .theme{margin:14px 0 30px;font-size:clamp(16px,2.5vw,24px)}
    .countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .box{padding:22px 8px;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(255,255,255,.07)}
    .value{display:block;color:#f3d98a;font-size:clamp(36px,7vw,76px);font-weight:700;font-variant-numeric:tabular-nums}
    .label{display:block;margin-top:6px;font-size:clamp(13px,2vw,18px);text-transform:uppercase;letter-spacing:.08em}
    .info{margin-top:28px;font-size:clamp(16px,2.2vw,22px);line-height:1.7}
    .message{margin-top:20px;color:#f3d98a;font-size:clamp(20px,3vw,30px);font-weight:700}
    @media(max-width:620px){.countdown{grid-template-columns:repeat(2,1fr)}.wrap{padding:28px 14px}}
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">1996 – 2026</p>
    <h1>30 năm Hội ngộ lớp 96Q</h1>
    <p class="theme">Kết nối – Ký ức – Tiếp nối hành trình</p>
    <section class="countdown" aria-label="Đồng hồ đếm ngược">
      <div class="box"><span class="value" id="days">00</span><span class="label">Ngày</span></div>
      <div class="box"><span class="value" id="hours">00</span><span class="label">Giờ</span></div>
      <div class="box"><span class="value" id="minutes">00</span><span class="label">Phút</span></div>
      <div class="box"><span class="value" id="seconds">00</span><span class="label">Giây</span></div>
    </section>
    <div class="info">
      <div>18:45 · Thứ Bảy, ngày 15 tháng 8 năm 2026</div>
      <div>Đồ Sơn – Hải Phòng</div>
    </div>
    <div class="message" id="message"></div>
  </main>
  <script>
    const EVENT_TIME = "2026-08-15T18:45:00+07:00";
    const els = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      message: document.getElementById("message")
    };
    const pad = n => String(n).padStart(2,"0");
    function updateCountdown(){
      const remaining = new Date(EVENT_TIME).getTime() - Date.now();
      if(remaining<=0){
        els.days.textContent="00";els.hours.textContent="00";els.minutes.textContent="00";els.seconds.textContent="00";
        els.message.textContent="Chào mừng ngày Hội ngộ 30 năm lớp 96Q!";
        return;
      }
      const totalSeconds=Math.floor(remaining/1000);
      els.days.textContent=pad(Math.floor(totalSeconds/86400));
      els.hours.textContent=pad(Math.floor((totalSeconds%86400)/3600));
      els.minutes.textContent=pad(Math.floor((totalSeconds%3600)/60));
      els.seconds.textContent=pad(totalSeconds%60);
    }
    updateCountdown();
    setInterval(updateCountdown,1000);
  </script>
</body>
</html>
